services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: maiz-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      APP_ENV: production
      DEBUG: "false"
      CORS_ALLOW_ORIGINS: http://localhost:3000,http://localhost:5173
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB_NAME: maiz
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: maiz-mongo
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  mongo_data:
